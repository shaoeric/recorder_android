name: Build APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '1.0.0'
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        run: gradle clean assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} --no-daemon --no-build-cache

      - name: Sign Release APK
        if: github.event.inputs.build_type == 'release'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare APK for Release
        run: |
          VERSION="${{ github.event.inputs.version_name }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          mkdir -p release_apk
          if [ "$BUILD_TYPE" = "release" ]; then
            cp app/build/outputs/apk/release/*.apk "release_apk/recorder-v${VERSION}-release.apk"
          else
            cp app/build/outputs/apk/debug/*.apk "release_apk/recorder-v${VERSION}-debug.apk"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: v${{ github.event.inputs.version_name }}
          body: "录音机 v${{ github.event.inputs.version_name }} — ${{ github.event.inputs.build_type }} 构建"
          files: release_apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
